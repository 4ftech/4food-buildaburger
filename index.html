<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Build your custom 4food burger — a recreation of the original 4food.com Build-A-Burger.">
  <meta name="theme-color" content="#ffffff">
  <title>Build-A-Burger · 4food</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="bb" role="main">

    <div class="bb__layout">

      <!-- LEFT: stacked burger preview (41%) -->
      <section class="bb-stack" aria-label="Your burger">
        <div class="bb-stack__inner" id="stack">
          <!-- Layers injected by JS -->
        </div>
      </section>

      <!-- RIGHT: ingredient picker (59%) -->
      <aside class="bb-picker" aria-label="Ingredient picker">
        <header class="bb-picker__header">
          <h2 class="bb-picker__title" id="picker-title">Choose a Bun</h2>
        </header>

        <div class="bb-picker__list" id="picker-list" role="listbox" aria-labelledby="picker-title">
          <!-- Options injected by JS -->
        </div>
      </aside>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
